<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Redirect unknown GitHub Pages paths back into the SPA entry point.
      // p= encodes the requested path so index.html can restore it.
      var pathname = window.location.pathname.replace(/\/$/, "");
      var search = window.location.search
        ? "&q=" + window.location.search.slice(1).replace(/&/g, "~and~")
        : "";
      var hash = window.location.hash || "";

      window.location.replace("/?p=" + pathname + search + hash);
    </script>
  </head>
  <body></body>
</html>
